<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Chat Comments</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-purple-50 to-blue-50 min-h-screen">
    <div class="container mx-auto px-4 py-8 max-w-4xl">
        <!-- Header -->
        <div class="bg-white rounded-lg shadow-lg p-6 mb-6">
            <h1 class="text-3xl font-bold text-gray-800 mb-2">🌍 Global Chat Comments</h1>
            <p class="text-gray-600">Public comments shared with everyone worldwide!</p>
            <div class="mt-2 flex items-center gap-2 text-sm">
                <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                <span id="statusText" class="text-green-600">Ready</span>
            </div>
        </div>

        <!-- Comment Input Section -->
        <div class="bg-white rounded-lg shadow-lg p-6 mb-6">
            <div class="mb-4">
                <input 
                    type="text" 
                    id="nameInput" 
                    placeholder="Your name..." 
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500 mb-3"
                />
                <textarea 
                    id="commentInput" 
                    placeholder="Write your comment..." 
                    rows="3"
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500 resize-none"
                ></textarea>
            </div>
            <button 
                id="postBtn"
                onclick="addComment()" 
                class="bg-gradient-to-r from-purple-500 to-blue-500 text-white px-6 py-2 rounded-lg font-semibold hover:from-purple-600 hover:to-blue-600 transition duration-300 shadow-md disabled:opacity-50 disabled:cursor-not-allowed"
            >
                Post to World 🌐
            </button>
        </div>

        <!-- Comments Display Section -->
        <div class="bg-white rounded-lg shadow-lg p-6">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-2xl font-bold text-gray-800">Global Comments (<span id="commentCount">0</span>)</h2>
                <button 
                    onclick="loadComments(true)" 
                    class="text-purple-500 hover:text-purple-700 transition"
                    title="Refresh comments"
                >
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
                    </svg>
                </button>
            </div>
            <div id="commentsContainer" class="space-y-4">
                <div class="text-center py-8 text-gray-500">
                    <div class="animate-spin w-8 h-8 border-4 border-purple-500 border-t-transparent rounded-full mx-auto mb-2"></div>
                    Loading...
                </div>
            </div>
        </div>
    </div>

    <script>
        let comments = [];
        let isLoading = false;
        let storageAvailable = false;

        // Check if storage is available
        async function checkStorage() {
            try {
                if (window.storage && typeof window.storage.get === 'function') {
                    storageAvailable = true;
                    setStatus('Connected', 'green');
                    return true;
                }
            } catch (e) {
                console.log('Storage check failed:', e);
            }
            storageAvailable = false;
            setStatus('Waiting for storage...', 'yellow');
            return false;
        }

        function setStatus(message, color = 'green') {
            const statusEl = document.getElementById('statusText');
            statusEl.textContent = message;
            statusEl.className = `text-${color}-600`;
        }

        async function loadComments(showStatus = false) {
            if (isLoading) return;
            isLoading = true;
            
            if (showStatus) setStatus('Loading...', 'blue');
            
            // Check storage availability first
            if (!storageAvailable) {
                await checkStorage();
            }
            
            if (!storageAvailable) {
                setStatus('Storage not ready', 'red');
                renderComments();
                isLoading = false;
                return;
            }
            
            try {
                const result = await window.storage.get('global-comments-v2', true);
                if (result && result.value) {
                    comments = JSON.parse(result.value);
                    if (showStatus) setStatus('Loaded!', 'green');
                }
            } catch (error) {
                console.log('Starting fresh - no existing comments:', error);
                comments = [];
            }
            
            renderComments();
            isLoading = false;
            
            if (showStatus) {
                setTimeout(() => setStatus('Connected', 'green'), 1500);
            }
        }

        async function saveComments() {
            if (!storageAvailable) {
                setStatus('Storage not available - please refresh page', 'red');
                return false;
            }
            
            try {
                setStatus('Saving...', 'blue');
                const result = await window.storage.set('global-comments-v2', JSON.stringify(comments), true);
                
                if (result && result.key) {
                    setStatus('Saved!', 'green');
                    setTimeout(() => setStatus('Connected', 'green'), 2000);
                    return true;
                } else {
                    throw new Error('Storage returned no result');
                }
            } catch (error) {
                console.error('Save error:', error);
                setStatus('Save failed - retrying...', 'red');
                
                // Retry once after a brief delay
                await new Promise(resolve => setTimeout(resolve, 1000));
                try {
                    const result = await window.storage.set('global-comments-v2', JSON.stringify(comments), true);
                    if (result && result.key) {
                        setStatus('Saved!', 'green');
                        setTimeout(() => setStatus('Connected', 'green'), 1500);
                        return true;
                    }
                } catch (retryError) {
                    setStatus('❌ Storage error - refresh the page', 'red');
                    return false;
                }
                return false;
            }
        }

        async function addComment() {
            const nameInput = document.getElementById('nameInput');
            const commentInput = document.getElementById('commentInput');
            const postBtn = document.getElementById('postBtn');
            
            const name = nameInput.value.trim();
            const comment = commentInput.value.trim();
            
            if (!name || !comment) {
                alert('Please enter both your name and comment!');
                return;
            }

            postBtn.disabled = true;
            
            const newComment = {
                id: Date.now() + Math.random(),
                name: name,
                text: comment,
                timestamp: new Date().toLocaleString(),
                likes: 0
            };
            
            comments.unshift(newComment);
            renderComments();
            
            const saved = await saveComments();
            
            if (saved) {
                nameInput.value = '';
                commentInput.value = '';
            } else {
                comments.shift();
                renderComments();
                alert('Failed to post. Please try again.');
            }
            
            postBtn.disabled = false;
        }

        async function deleteComment(id) {
            if (confirm('Delete this comment? This will remove it for everyone.')) {
                comments = comments.filter(c => c.id !== id);
                renderComments();
                await saveComments();
            }
        }

        async function likeComment(id) {
            const comment = comments.find(c => c.id === id);
            if (comment) {
                comment.likes++;
                renderComments();
                await saveComments();
            }
        }

        function renderComments() {
            const container = document.getElementById('commentsContainer');
            const countElement = document.getElementById('commentCount');
            
            countElement.textContent = comments.length;
            
            if (comments.length === 0) {
                container.innerHTML = '<p class="text-gray-500 text-center py-8">No comments yet. Be the first to comment globally! 🌍</p>';
                return;
            }
            
            container.innerHTML = comments.map(comment => `
                <div class="border border-gray-200 rounded-lg p-4 hover:shadow-md transition duration-300 bg-gradient-to-r from-white to-purple-50">
                    <div class="flex items-start justify-between mb-2">
                        <div class="flex items-center gap-2">
                            <div class="w-10 h-10 bg-gradient-to-r from-purple-400 to-blue-400 rounded-full flex items-center justify-center text-white font-bold">
                                ${comment.name.charAt(0).toUpperCase()}
                            </div>
                            <div>
                                <p class="font-semibold text-gray-800">${escapeHtml(comment.name)}</p>
                                <p class="text-xs text-gray-500">${comment.timestamp}</p>
                            </div>
                        </div>
                        <button 
                            onclick="deleteComment(${comment.id})" 
                            class="text-red-500 hover:text-red-700 transition"
                        >
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path>
                            </svg>
                        </button>
                    </div>
                    <p class="text-gray-700 mb-3">${escapeHtml(comment.text)}</p>
                    <button 
                        onclick="likeComment(${comment.id})" 
                        class="flex items-center gap-2 text-purple-500 hover:text-purple-700 transition"
                    >
                        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
                            <path d="M2 10.5a1.5 1.5 0 113 0v6a1.5 1.5 0 01-3 0v-6zM6 10.333v5.43a2 2 0 001.106 1.79l.05.025A4 4 0 008.943 18h5.416a2 2 0 001.962-1.608l1.2-6A2 2 0 0015.56 8H12V4a2 2 0 00-2-2 1 1 0 00-1 1v.667a4 4 0 01-.8 2.4L6.8 7.933a4 4 0 00-.8 2.4z"></path>
                        </svg>
                        <span class="font-semibold">${comment.likes}</span>
                    </button>
                </div>
            `).join('');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Allow Enter key to submit
        document.getElementById('commentInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                addComment();
            }
        });

        // Initial load with storage check
        checkStorage().then(() => {
            loadComments();
        });

        // Keep checking for storage availability
        const storageCheckInterval = setInterval(async () => {
            if (!storageAvailable) {
                await checkStorage();
            } else {
                clearInterval(storageCheckInterval);
            }
        }, 2000);

        // Auto-refresh every 15 seconds
        setInterval(() => {
            if (storageAvailable) loadComments(false);
        }, 15000);
    </script>
</body>
</html>
